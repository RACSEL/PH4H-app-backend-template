    Meta:
      type: object
      properties:
        versionId:
          type: string
        lastUpdated:
          type: string
          format: date-time
        source:
          type: string
        profile:
          type: array
          items:
            type: string

    Identifier:
      type: object
      properties:
        use:
          type: string
          enum: [ usual, official, temp, secondary, old ]
        type:
          $ref: '#/components/schemas/CodeableConcept'
        system:
          type: string
        value:
          type: string

    BundleEntry:
      type: object
      required:
        - fullUrl
        - resource
      properties:
        fullUrl:
          type: string
          format: uri
        resource:
          $ref: '#/components/schemas/FhirResource'

    FhirResource:
      type: object
      required:
        - resourceType
      properties:
        resourceType:
          type: string
          enum:
            - Composition
            - Patient
            - Organization
            - Condition
            - MedicationStatement
            - Medication
            - AllergyIntolerance
            - Immunization
            - Procedure
            - Practitioner
      additionalProperties: true

    CodeableConcept:
      type: object
      properties:
        coding:
          type: array
          items:
            $ref: '#/components/schemas/Coding'
        text:
          type: string

    Coding:
      type: object
      properties:
        system:
          type: string
        code:
          type: string
        display:
          type: string

    Signature:
      type: object
      required:
        - type
        - when
        - who
        - data
      properties:
        type:
          type: array
          items:
            $ref: '#/components/schemas/Coding'
        when:
          type: string
          format: date-time
        who:
          type: object
          properties:
            reference:
              type: string
            identifier:
              $ref: '#/components/schemas/Identifier'
        data:
          type: string
          description: Base64 encoded signature content

